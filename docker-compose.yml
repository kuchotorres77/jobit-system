services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobit}
      POSTGRES_DB: ${POSTGRES_DB:-jobit}
    ports:
      - "5435:5432"
    volumes:
      - vpostgres:/var/lib/postgresql/data
    networks:
      - backend

  api-nest:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      # 13005: fuera de los rangos dinámicos que Windows/Hyper-V reserva (netsh interface ipv4 show excludedportrange)
      - "13005:3000"
    env_file:
      - ./apps/api/.env.docker
    environment:
      # Se toma del .env raíz; vacío = login con Google deshabilitado
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      # Persiste las imágenes subidas entre rebuilds del contenedor
      - vstorage:/app/storage
    depends_on:
      - postgres
    networks:
      - backend
      - frontend-net

  frontend:
    build:
      context: ./frontend/public
      dockerfile: Dockerfile
      args:
        # El client ID queda embebido en el build de Vite (no es un secreto)
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "80:80"
    depends_on:
      - api-nest
    networks:
      - frontend-net

volumes:
  vpostgres:
  vstorage:

networks:
  backend:
  frontend-net:
