services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobit}
      POSTGRES_DB: ${POSTGRES_DB:-jobit}
    ports:
      - "5435:5432"
    volumes:
      - vpostgres:/var/lib/postgresql/data
    networks:
      - backend

  # api-nest reemplazará a api cuando se complete la migración a NestJS + Prisma
  api-nest:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    env_file:
      - ./apps/api/.env.docker
    depends_on:
      - postgres
    networks:
      - backend
      - frontend-net

  mongodb:
    image: mongo:8.0.0-noble
    volumes:
      - vmongo:/data/db
    networks:
      - backend

  api:
    build:
      context: ./apps/api-service
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./apps/api-service/.env.docker
    depends_on:
      - mongodb
    networks:
      - backend
      - frontend-net

  frontend:
    build:
      context: ./frontend/public
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api-nest
    networks:
      - frontend-net

volumes:
  vmongo:
  vpostgres:

networks:
  backend:
  frontend-net:
